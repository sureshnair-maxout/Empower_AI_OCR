"""Document types configuration."""

invoice:
  code: INVOICE
  name: Invoice
  description: Commercial invoice document
  fields:
    invoice_number:
      data_type: string
      required: true
      pattern: "^[A-Z0-9\\-]{1,50}$"
    invoice_date:
      data_type: date
      required: true
      format: "YYYY-MM-DD"
    vendor_name:
      data_type: string
      required: true
    vendor_gst:
      data_type: string
      required: false
      pattern: "^[0-9]{2}[A-Z]{5}[0-9]{4}[A-Z]{1}[1-9A-Z]{1}Z[0-9A-Z]{1}$"
    total_amount:
      data_type: decimal
      required: true
      min: 0
    total_gst:
      data_type: decimal
      required: false
    payment_terms:
      data_type: string
      required: false

cheque:
  code: CHEQUE
  name: Cheque
  description: Bank cheque document
  fields:
    cheque_number:
      data_type: string
      required: true
    cheque_date:
      data_type: date
      required: true
    bank_name:
      data_type: string
      required: true
    branch_code:
      data_type: string
      required: false
    amount:
      data_type: decimal
      required: true
    payee_name:
      data_type: string
      required: true
    drawer_name:
      data_type: string
      required: false
    account_number:
      data_type: string
      required: false
      masked: true

pan_card:
  code: PAN_CARD
  name: PAN Card
  description: Permanent Account Number Card
  fields:
    pan_number:
      data_type: string
      required: true
      pattern: "^[A-Z]{5}[0-9]{4}[A-Z]{1}$"
      pii: true
      masked: true
    name:
      data_type: string
      required: true
    father_name:
      data_type: string
      required: false
    dob:
      data_type: date
      required: false
    gender:
      data_type: string
      required: false

aadhaar_card:
  code: AADHAAR_CARD
  name: Aadhaar Card
  description: Aadhaar Unique Identity Card
  fields:
    aadhaar_number:
      data_type: string
      required: true
      pattern: "^\\d{12}$"
      pii: true
      masked: true
    name:
      data_type: string
      required: true
    dob:
      data_type: date
      required: true
    gender:
      data_type: string
      required: true
    address:
      data_type: string
      required: false
